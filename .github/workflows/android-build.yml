name: 🤖 Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (optional)'
        required: false
        default: '1.0.0'

jobs:
  build-android:
    name: Build APK/AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # 1. Kodu çek
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Java 17 kur
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Node.js kur
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 4. Bağımlılıkları yükle
      - name: 📦 Install npm dependencies
        run: npm ci

      # 5. Web projesini build et
      - name: 🔨 Build web application
        run: npm run build

      # 6. Capacitor Android ekle ve senkronize et      - name: ⚡ Setup Capacitor Android
        run: |
          npx cap add android
          npx cap sync android

      # 7. versionCode'u otomatik artır
      - name: 🔢 Set versionCode
        run: |
          VERSION_CODE=$(date +%Y%m%d%H)
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      # 8. versionName'i ayarla
      - name: 🏷️ Set versionName
        run: |
          VERSION_NAME="${{ github.event.inputs.version || secrets.APP_VERSION || '1.0.0' }}"
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      # 9. Keystore'u decode et
      - name: 🔑 Setup signing configuration
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/engelsizai-release.jks
          cat >> android/gradle.properties << EOF
          android.injected.signing.store.file=app/engelsizai-release.jks
          android.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }}
          android.injected.signing.key.alias=${{ secrets.KEY_ALIAS }}
          android.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          EOF

      # 10. Android SDK hazırla
      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      # 11. Release APK build et
      - name: 🏗️ Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/engelsizai-release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon

      # 12. Release AAB build et
      - name: 🏗️ Build Release AAB
        run: |
          cd android          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=app/engelsizai-release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon

      # 13. APK artifact yükle
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: engelsizai-${{ env.VERSION_NAME }}-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # 14. AAB artifact yükle
      - name: 📤 Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: engelsizai-${{ env.VERSION_NAME }}-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # 15. GitHub Release oluştur (tag ile push edilirse)
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: EngelsizAI ${{ env.VERSION_NAME }}
          tag_name: ${{ github.ref_name }}
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
          draft: false
          prerelease: false

      # 16. Build özeti
      - name: 📋 Build Summary
        run: |
          echo "✅ Build completed successfully!"
          echo "📦 APK: android/app/build/outputs/apk/release/app-release.apk"
          echo "📦 AAB: android/app/build/outputs/bundle/release/app-release.aab"
          echo "🔖 Version: ${{ env.VERSION_NAME }} (${{ env.VERSION_CODE }})"
