name: 🤖 Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔨 Build web app
        run: npm run build

      - name: ⚡ Add Capacitor Android
        run: npx --yes @capacitor/cli cap add android

      - name: ⚡ Sync Capacitor
        run: npx --yes @capacitor/cli cap sync android

      - name: 🔑 Setup Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/engelsizai-release.jks
          
          # app/build.gradle içine signing config ekle (daha güvenilir yöntem)
          cat >> android/app/build.gradle << 'EOF'

android {
    signingConfigs {
        release {
            storeFile file("engelsizai-release.jks")
            storePassword "${System.properties['STORE_PASSWORD']}"
            keyAlias "${System.properties['KEY_ALIAS']}"
            keyPassword "${System.properties['KEY_PASSWORD']}"
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
        }
    }
}
EOF

      - name: 🏗️ Build APK (Debug + Release)
        run: |
          cd android
          chmod +x gradlew
          
          # Önce debug build (kesin çalışır)
          ./gradlew assembleDebug --stacktrace
          
          # Sonra release build (imzalı)
          ./gradlew assembleRelease \
            -PSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
            --stacktrace || echo "Release build failed, using debug APK"

      - name: 🔍 Debug: APK dosyalarını listele
        run: |
          echo "📁 Aranan APK dosyaları:"
          find android/app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "❌ APK bulunamadı"
          
          echo "📁 Klasör yapısı:"
          ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "❁ Klasör yok"

      - name: 📤 Upload APK (Esnek yol)
        uses: actions/upload-artifact@v4
        with:
          name: engelsizai-apk
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn
