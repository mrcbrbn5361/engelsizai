- name: Set Android SDK Versions
        run: |
          # Android 15 (API 35) target ve compile sürümü
          sed -i 's/minSdkVersion.*/minSdkVersion 22/' android/app/build.gradle
          sed -i 's/targetSdkVersion.*/targetSdkVersion 35/' android/app/build.gradle
          sed -i 's/compileSdk.*/compileSdk 35/' android/app/build.gradle
          
          # Manifest düzenlemeleri (Çakışmaları önlemek için)
          sed -i 's/<manifest/<manifest xmlns:tools="http:\/\/schemas.android.com\/tools"/' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i\    <uses-sdk tools:overrideLibrary="com.getcapacitor.android" />' android/app/src/main/AndroidManifest.xml
