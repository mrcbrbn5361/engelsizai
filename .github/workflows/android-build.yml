name: 🤖 Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔨 Build web app
        run: npm run build

      - name: ⚡ Add Capacitor Android
        run: npx --yes @capacitor/cli cap add android

      - name: ⚡ Sync Capacitor
        run: npx --yes @capacitor/cli cap sync android

      - name: 🔑 Setup Keystore
        run: |
          # Keystore'u decode et
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/engelsizai-release.jks
          
          # gradle.properties'e signing bilgilerini ekle
          echo "STORE_FILE=engelsizai-release.jks" >> android/gradle.properties
          echo "STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> android/gradle.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties
          
          # app/build.gradle dosyasında release buildType'ı bul ve signingConfig ekle
          sed -i '/buildTypes {/a\        release {\n            signingConfig signingConfigs.release\n        }' android/app/build.gradle

      - name: 🏗️ Build APK
        run: |
          cd android
          chmod +x gradlew
          # Debug önce dene (daha az hata)
          ./gradlew assembleDebug --stacktrace || true
          # Release build dene
          ./gradlew assembleRelease --stacktrace || echo "Release failed, debug APK will be used"

      - name: 🔍 Debug: APK dosyalarını bul
        run: |
          echo "🔎 APK arıyor..."
          find android/app/build/outputs -name "*.apk" -type f 2>/dev/null | head -20
          echo "📁 Klasörler:"
          ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "APK klasörü yok"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: engelsizai-apk
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn
