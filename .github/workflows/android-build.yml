name: 🤖 Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build web
        run: npm run build

      - name: Add Android
        run: npx --yes @capacitor/cli cap add android

      - name: Sync Android
        run: npx --yes @capacitor/cli cap sync android

      - name: Setup signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/engelsizai-release.jks
          echo "STORE_FILE=engelsizai-release.jks" >> android/gradle.properties
          echo "STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> android/gradle.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Find APK
        run: find android/app/build/outputs -name "*.apk" -print

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: engelsizai-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
